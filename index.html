<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Control Gadget</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --primary: #2563eb;
            --danger: #dc2626;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px 20px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-control {
            background-color: var(--primary);
        }

        .btn-stop {
            background-color: var(--danger);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        /* Stilul când ecranul este preluat sub control total */
        .controlled-mode {
            background-color: #450a0a !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-group">
            <input type="text" id="secretCode" placeholder="COD SECRET">
        </div>

        <button id="mainBtn" class="btn-control">CONTROL</button>

        <div id="status" class="status-msg">Dispozitiv pregătit pentru conectare</div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // ATENȚIE: Schimbă 'localhost' cu IP-ul calculatorului tău pentru testul pe telefon/tabletă
        // Exemplu: const SERVER_URL = "http://192.168.1.5:3000";
        const SERVER_URL = "http://localhost:3000";
        
        let socket;
        const secretCodeInput = document.getElementById('secretCode');
        const mainBtn = document.getElementById('mainBtn');
        const statusDiv = document.getElementById('status');

        let amControlul = false;

        try {
            socket = io(SERVER_URL);
            
            socket.on('connect', () => {
                statusDiv.innerText = "Conectat la serverul de semnalizare.";
                statusDiv.style.color = "#94a3b8";
            });

            socket.on('connect_error', () => {
                statusDiv.innerText = "Așteptare: Pornirea serverului backend local...";
                statusDiv.style.color = "#ef4444";
            });

            initSocketEvents();
        } catch (e) {
            console.log("Eroare la încărcarea Socket.io");
        }

        // Când se introduce codul, dispozitivul este mutat în camera respectivă de pe server
        secretCodeInput.addEventListener('input', () => {
            const cod = secretCodeInput.value.trim();
            if (cod && socket && socket.connected) {
                socket.emit('join-room', cod);
                statusDiv.innerText = "Conectat la canalul secret: " + cod;
                statusDiv.style.color = "#10b981";
            }
        });

        // Logica de apăsare pe butonul CONTROL / STOP
        mainBtn.addEventListener('click', () => {
            const cod = secretCodeInput.value.trim();
            if (!cod) {
                alert("Scrie codul secret mai întâi!");
                return;
            }

            if (!socket || !socket.connected) {
                alert("Verifică dacă serverul local Node.js rulează în rețea!");
                return;
            }

            if (!amControlul) {
                // Trimitem semnalul de START CONTROL
                socket.emit('action-control', { room: cod, type: 'START' });
                
                amControlul = true;
                mainBtn.innerText = "STOP";
                mainBtn.className = "btn-stop";
                statusDiv.innerText = "Controlezi celălalt gadget...";
                statusDiv.style.color = "#f8fafc";
            } else {
                // Trimitem semnalul de STOP CONTROL
                socket.emit('action-control', { room: cod, type: 'STOP' });
                
                amControlul = false;
                mainBtn.innerText = "CONTROL";
                mainBtn.className = "btn-control";
                statusDiv.innerText = "Control oprit.";
                statusDiv.style.color = "#94a3b8";
            }
        });

        function initSocketEvents() {
            // Ascultăm semnalele primite de la distanță de pe celălalt dispozitiv
            socket.on('execute-control', (data) => {
                if (data.type === 'START') {
                    statusDiv.innerText = "ACEST GADGET ESTE CONTROLAT TOTAL DE LA DISTANȚĂ!";
                    statusDiv.style.color = "#ef4444";
                    document.body.classList.add('controlled-mode');
                    secretCodeInput.disabled = true;
                    mainBtn.disabled = true; // Se blochează tot ecranul pe gadgetul controlat
                } 
                else if (data.type === 'STOP') {
                    statusDiv.innerText = "Dispozitiv eliberat din control.";
                    statusDiv.style.color = "#94a3b8";
                    document.body.classList.remove('controlled-mode');
                    secretCodeInput.disabled = false;
                    mainBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
